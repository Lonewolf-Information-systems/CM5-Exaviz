PACKAGE_NAME="metis"
PACKAGE_VERSION="@PKGVER@"

BUILT_MODULE_NAME[0]="metis"
BUILT_MODULE_LOCATION[0]="."

DEST_MODULE_LOCATION[0]="/kernel/drivers/axelera"

MAKE[0]="make KDIR=/lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build"
CLEAN="make KDIR=/lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

AUTOINSTALL="yes"
REMAKE_INITRD="no"
