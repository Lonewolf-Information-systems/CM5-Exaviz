# RPi5/CM5 UEFI — dracut config
# Modules needed before root mount for CM5 hardware

# Kernel modules to pull into initramfs
# configfs: needed for runtime dtbo loading
# of_overlay: device tree overlay engine
# gpio-*: needed for BT/GPIO devices described in overlays
# hci_uart: Bluetooth over UART (BT on CM5 uses RP1 UART → HCI)
add_drivers+=" \
    configfs \
    of_overlay \
    gpio_raspberrypi \
    pinctrl-rp1 \
    hci_uart \
    btbcm \
    bluetooth \
    rfkill \
    pcie-brcmstb \
    nvme \
    nvme-core \
    "

# Include DTB and overlay blobs in initramfs
# GRUB passes the base DTB; overlays applied in initqueue
install_items+=" \
    /boot/firmware/bcm2712-rpi-cm5.dtb \
    /boot/firmware/overlays/cruiser-raspberrypi-cm5.dtbo \
    /boot/firmware/overlays/disable-bt.dtbo \
    "

# Include the overlay application script
install_items+=" /usr/lib/dracut/modules.d/99dt-overlay/apply-overlays.sh "

# hostonly=no — generic initramfs, CM5 moves between builds
hostonly="no"
```

---

**Custom dracut module — `99dt-overlay`:**

This is the equivalent of `installkernel` hooks but for runtime overlay application via configfs:
```
/usr/lib/dracut/modules.d/99dt-overlay/
├── module-setup.sh
├── apply-overlays.sh
└── dt-overlay.service
